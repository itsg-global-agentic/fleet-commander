name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native dependencies
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (server)
        run: npx vitest run --project server

      - name: Test (client)
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
        run: |
          SHARDS=10
          FAILED=0
          for (( i=1; i<=SHARDS; i++ )); do
            echo ""
            echo "=== Client shard $i/$SHARDS ==="
            if ! npx vitest run --project client --reporter=basic --shard=$i/$SHARDS; then
              echo "::warning::Client shard $i/$SHARDS failed"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "::error::Some client test shards failed"
            exit 1
          fi
