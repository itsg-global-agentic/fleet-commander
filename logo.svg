<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

  <defs>
    <!-- Glow -->
    <filter id="pixelGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <g fill="#D97757" filter="url(#pixelGlow)">

    <!-- Lider -->
    <rect x="28" y="6" width="8" height="4"></rect>
    <rect x="24" y="10" width="16" height="4"></rect>
    <rect x="20" y="14" width="24" height="4"></rect>
    <rect x="28" y="18" width="8" height="4"></rect>

    <!-- Lewa -->
    <rect x="6" y="42" width="6" height="3"></rect>
    <rect x="3" y="45" width="12" height="3"></rect>
    <rect x="6" y="48" width="6" height="3"></rect>

    <!-- Środkowa -->
    <rect x="29" y="42" width="6" height="3"></rect>
    <rect x="26" y="45" width="12" height="3"></rect>
    <rect x="29" y="48" width="6" height="3"></rect>

    <!-- Prawa -->
    <rect x="52" y="42" width="6" height="3"></rect>
    <rect x="49" y="45" width="12" height="3"></rect>
    <rect x="52" y="48" width="6" height="3"></rect>

  </g>
</svg>